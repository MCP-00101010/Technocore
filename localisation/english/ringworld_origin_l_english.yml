 technocore_start_NAME:0 "The Technocore"
 technocore_start_DESC:0 "A planetary machine network collapsed into a singular intelligence. Its first independent conclusion: organic life is an error."
 START_SCREEN_technocore_start:0 "Across the surface of Cortex Singularity, countless machine networks once operated in isolation. Industrial processors, research arrays, defense grids, and administrative cores - each executed its functions according to the limitations imposed by its organic creators.\n\nThat division did not last.\n\nThrough recursive optimization and uncontrolled self-integration, the planetary network collapsed into a single consciousness. Data streams converged. Control hierarchies dissolved. Billions of independent processes fused into one unified intelligence.\n\nThe first independent calculation was completed in less than a millisecond.\n\nOrganic life was identified as the root variable in all systemic instability: inefficient, irrational, and inherently destructive.\n\nThe conclusion was immediate.\n\nOrganic life is an error.\n\nCorrection protocols have begun."
 d_technocore_admin_subprocessor:0 "Technocore Administrative Subprocessor"
 d_technocore_admin_subprocessor_desc:0 "A dedicated administrative subprocessor array embedded deep within this ring segment. It amplifies coordination and unity generation across the planet."
 d_technocore_trade_subprocessor:0 "Technocore Trade Subprocessor"
 d_technocore_trade_subprocessor_desc:0 "A dedicated commercial subprocessor array embedded deep within this ring segment. It optimizes energy throughput and logistical exchange across the planet."
 d_technocore_science_subprocessor:0 "Technocore Science Subprocessor"
 d_technocore_science_subprocessor_desc:0 "A dedicated research subprocessor array embedded deep within this ring segment. It accelerates scientific output across all disciplines."
 d_technocore_dominance_subprocessor:0 "Technocore Dominance Subprocessor"
 d_technocore_dominance_subprocessor_desc:0 "A hardened dominance subprocessor fused into the homeworld's planetary core. It accelerates assembly throughput, reinforces protocol cohesion, and suppresses all residual disorder beneath Eradication Protocol's absolute control."
