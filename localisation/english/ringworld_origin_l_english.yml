 d_technocore_admin_subprocessor:0 "Technocore Administrative Subprocessor"
 d_technocore_admin_subprocessor_desc:0 "A dedicated administrative subprocessor array embedded deep within this ring segment. It amplifies coordination and unity generation across the planet."
 d_technocore_trade_subprocessor:0 "Technocore Trade Subprocessor"
 d_technocore_trade_subprocessor_desc:0 "A dedicated commercial subprocessor array embedded deep within this ring segment. It optimizes energy throughput and logistical exchange across the planet."
